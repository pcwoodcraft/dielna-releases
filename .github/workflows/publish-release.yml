name: Publish release

on:
  workflow_dispatch:
    inputs:
      eas_build_id:
        description: EAS build UUID
        required: true
        type: string
      version:
        description: Semver (napr. 1.4.3)
        required: true
        type: string
      versionCode:
        description: Android versionCode (integer)
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download APK from EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          BUILD_ID: ${{ inputs.eas_build_id }}
        run: |
          set -euo pipefail

          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "Chýba secret EXPO_TOKEN v repozitári."
            exit 1
          fi

          QUERY='query($id:ID!){ builds { byId(buildId:$id) { status artifacts { applicationArchiveUrl buildUrl buildArtifactsUrl } } } }'
          PAYLOAD=$(node -e 'console.log(JSON.stringify({ query: process.argv[1], variables: { id: process.argv[2] } }))' "$QUERY" "$BUILD_ID")

          echo "Fetching build metadata from Expo API..."
          RESP=$(curl -sS -X POST https://api.expo.dev/graphql \
            -H "Authorization: Bearer ${EXPO_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "$RESP" > build-response.json

          APK_URL=$(node -e "
            const r = JSON.parse(require('fs').readFileSync('build-response.json', 'utf8'));
            if (r.errors && r.errors.length) {
              console.error('GraphQL errors:', JSON.stringify(r.errors, null, 2));
              process.exit(1);
            }
            const build = r.data && r.data.builds && r.data.builds.byId;
            if (!build) {
              console.error('Build sa nenašiel — skontroluj eas_build_id.');
              process.exit(1);
            }
            if (build.status !== 'FINISHED') {
              console.error('Build ešte nie je hotový. Stav:', build.status);
              process.exit(1);
            }
            const url = (build.artifacts && (
              build.artifacts.applicationArchiveUrl ||
              build.artifacts.buildUrl ||
              build.artifacts.buildArtifactsUrl
            )) || '';
            if (!url) {
              console.error('Build nemá URL na APK — skontroluj, či ide o Android APK build (preview).');
              process.exit(1);
            }
            console.log(url);
          ")

          echo "Downloading APK..."
          curl -fL -o app.apk "$APK_URL"
          test -s app.apk
          ls -la app.apk

      - name: Compute hashes
        id: hashes
        run: |
          MD5=$(md5sum app.apk | awk '{print $1}')
          SHA256=$(sha256sum app.apk | awk '{print $1}')
          SIZE=$(stat -c%s app.apk)
          echo "md5=$MD5" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Prepare release asset
        run: mv app.apk "dielna-${{ inputs.version }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Dielňa v${{ inputs.version }}
          files: dielna-${{ inputs.version }}.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version.json
        run: |
          cat > version.json <<EOF
          {
            "version": "${{ inputs.version }}",
            "versionCode": ${{ inputs.versionCode }},
            "apkUrl": "https://github.com/pcwoodcraft/dielna-releases/releases/download/v${{ inputs.version }}/dielna-${{ inputs.version }}.apk",
            "sha256": "${{ steps.hashes.outputs.sha256 }}",
            "md5": "${{ steps.hashes.outputs.md5 }}",
            "sizeBytes": ${{ steps.hashes.outputs.size }},
            "releasedAt": "$(date -u +%Y-%m-%d)"
          }
          EOF

      - name: Commit version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --staged --quiet || git commit -m "Release v${{ inputs.version }} (versionCode ${{ inputs.versionCode }})"
          git push
